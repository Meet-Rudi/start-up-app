<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Rudi — Personality Test Console</title>
<link rel="icon" href="../favicon.ico" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#263d7d; --blue:#3b75a5; --magenta:#e925c9; --cyan:#00e5e5;
    --bg:#f0f0f0; --surface:#fff; --muted:#9da2af; --border:#d9d9d9;
    --in:#fff; --out:#d9fdd3; --thread-bg:#eae6df;
    --font:"Nunito",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);color:var(--navy);background:var(--bg);height:100vh;display:flex;flex-direction:column}
  button{font-family:inherit;cursor:pointer}

  header.topbar{display:flex;align-items:center;gap:.6rem;padding:.5rem 1rem;background:var(--navy);color:#fff}
  header.topbar img{height:26px}
  header.topbar .title{font-weight:800;letter-spacing:.02em}
  header.topbar .mode{margin-left:auto;font-size:.72rem;padding:.2rem .6rem;border-radius:999px;background:rgba(255,255,255,.15)}
  header.topbar .mode.demo{background:var(--magenta)}
  .btn{border:none;border-radius:999px;padding:.5rem 1rem;font-weight:700;font-size:.85rem}
  .btn.primary{background:var(--magenta);color:#fff}
  .btn.ghost{background:rgba(255,255,255,.15);color:#fff}
  .btn.light{background:#eef2fb;color:var(--navy);border:1px solid var(--border)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---- main ---- */
  .main{flex:1;overflow-y:auto;padding:1rem 1.25rem}
  .toolbar{display:flex;gap:.6rem;align-items:center;margin-bottom:1rem}
  .toolbar h2{margin:0;font-size:1.05rem;margin-right:auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.9rem}
  .card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:.8rem;padding:.9rem 1rem;cursor:pointer;transition:box-shadow .15s}
  .card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
  .card .cname{font-weight:800;font-size:1rem;margin-bottom:.2rem;padding-right:1.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .cmeta{font-size:.72rem;color:var(--muted);margin-bottom:.5rem}
  .card .cprev{font-size:.85rem;color:#5a6072;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .persona{display:inline-block;margin-top:.5rem;font-size:.68rem;font-weight:700;background:#eef2fb;color:var(--navy);padding:.15rem .55rem;border-radius:999px}
  .card .x{position:absolute;top:.5rem;right:.55rem;width:22px;height:22px;border-radius:50%;border:none;background:#f0f0f0;color:var(--muted);font-weight:800;line-height:1;font-size:.9rem}
  .card .x:hover{background:#fdeaea;color:#b23b3b}
  .empty{color:var(--muted);text-align:center;padding:3rem}

  /* ---- modal shell ---- */
  .overlay{position:fixed;inset:0;background:rgba(20,26,48,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:1rem}
  .overlay.hidden{display:none}
  .modal{background:var(--surface);border-radius:1rem;width:100%;max-width:440px;padding:1.4rem;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .modal h3{margin:.1rem 0 1rem}
  .modal label{display:block;font-size:.78rem;font-weight:700;margin:.7rem 0 .25rem}
  .modal input,.modal select{width:100%;padding:.6rem .8rem;border:1px solid var(--border);border-radius:.6rem;font-family:inherit;font-size:.92rem;outline:none}
  .modal .row{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}
  .modal .err{color:#b23b3b;font-size:.8rem;margin-top:.6rem;min-height:1rem}
  .modal .choice{display:flex;flex-direction:column;gap:.6rem;margin-top:.4rem}
  .modal .choice .btn{width:100%;padding:.8rem}

  /* ---- conversation modal (chat) ---- */
  .chat{width:100%;max-width:560px;height:min(86vh,760px);display:flex;flex-direction:column;padding:0;overflow:hidden}
  .chat .chead{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;background:var(--navy);color:#fff}
  .chat .chead .cn{font-weight:800}
  .chat .chead .cp{margin-left:auto;font-size:.68rem;background:rgba(255,255,255,.16);padding:.15rem .55rem;border-radius:999px}
  .chat .feed{flex:1;overflow-y:auto;background:var(--thread-bg);padding:1rem;display:flex;flex-direction:column;gap:.4rem}
  .bubble{max-width:78%;padding:.5rem .7rem;border-radius:.6rem;font-size:.92rem;line-height:1.35;box-shadow:0 1px .5px rgba(0,0,0,.08);white-space:pre-wrap;word-wrap:break-word}
  .bubble .stamp{display:block;text-align:right;font-size:.62rem;color:var(--muted);margin-top:.15rem}
  .msg{display:flex}
  .msg.rudi{justify-content:flex-start}.msg.rudi .bubble{background:var(--in);border-top-left-radius:.15rem}
  .msg.me{justify-content:flex-end}.msg.me .bubble{background:var(--out);border-top-right-radius:.15rem}
  .chat .cfoot{border-top:1px solid var(--border);background:var(--surface);padding:.6rem .8rem;display:flex;flex-direction:column;gap:.5rem}
  .chat .cfoot textarea{width:100%;resize:none;height:44px;max-height:110px;padding:.55rem .8rem;border:1px solid var(--border);border-radius:.8rem;font-family:inherit;font-size:.92rem;outline:none}
  .chat .cfoot .actions{display:flex;gap:.5rem}
  .chat .cfoot .actions .btn{flex:0 0 auto}
  .chat .cfoot .actions .spacer{flex:1}
  .typing{font-size:.75rem;color:var(--muted);padding:0 .2rem}

  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:.5rem 1rem;border-radius:.6rem;font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}

  /* ---- login ---- */
  .login{max-width:360px}
  .login .brand{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
  .login .brand img{height:30px}
  .login .brand span{font-weight:800;font-size:1.1rem}
</style>
</head>
<body>
<header class="topbar">
  <img src="../assets/rudi-logo.png" alt="Rudi" onerror="this.style.display='none'"/>
  <span class="title">Personality Test Console</span>
  <span class="mode" id="mode">…</span>
</header>

<!-- MAIN -->
<div class="main" id="mainScreen" style="display:none">
  <div class="toolbar">
    <h2>Test conversations</h2>
    <button class="btn light" id="exportBtn">⬇ Export conversations</button>
    <button class="btn primary" id="newBtn">＋ New conversation</button>
    <button class="btn light" id="logoutBtn">Log out</button>
  </div>
  <div class="cards" id="cards"></div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="modal login">
    <div class="brand"><img src="../assets/rudi-logo.png" onerror="this.style.display='none'"/><span>Test Console</span></div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="tester@meetrudi.local"/>
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••"/>
    <div class="err" id="loginErr"></div>
    <div class="row"><button class="btn primary" id="loginBtn">Sign in</button></div>
  </div>
</div>

<!-- NEW CONVERSATION -->
<div class="overlay hidden" id="newOverlay">
  <div class="modal">
    <h3>New test conversation</h3>
    <label for="convName">Name (to tell conversations apart)</label>
    <input id="convName" type="text" placeholder="e.g. Ava — anxious newcomer"/>
    <label for="convPersona">Personality (fixed for this conversation)</label>
    <select id="convPersona"></select>
    <div class="err" id="newErr"></div>
    <div class="row">
      <button class="btn light" data-close="newOverlay">Cancel</button>
      <button class="btn primary" id="createBtn">Start</button>
    </div>
  </div>
</div>

<!-- EXPORT CHOICE -->
<div class="overlay hidden" id="exportOverlay">
  <div class="modal">
    <h3>Export conversations</h3>
    <div class="choice">
      <button class="btn primary" id="exportAllBtn">Export ALL</button>
      <button class="btn light" id="exportIntervalOpenBtn">Export time interval…</button>
    </div>
    <div class="row"><button class="btn light" data-close="exportOverlay">Cancel</button></div>
  </div>
</div>

<!-- EXPORT INTERVAL -->
<div class="overlay hidden" id="intervalOverlay">
  <div class="modal">
    <h3>Export time interval</h3>
    <label for="fromDate">From (YYYY-MM-DD)</label>
    <input id="fromDate" type="date"/>
    <label for="toDate">To (YYYY-MM-DD)</label>
    <input id="toDate" type="date"/>
    <div class="err" id="intervalErr"></div>
    <div class="row">
      <button class="btn light" data-close="intervalOverlay">Cancel</button>
      <button class="btn primary" id="extractBtn">Extract</button>
    </div>
  </div>
</div>

<!-- CONVERSATION (CHAT) -->
<div class="overlay hidden" id="chatOverlay">
  <div class="modal chat">
    <div class="chead"><span class="cn" id="chatName"></span><span class="cp" id="chatPersona"></span></div>
    <div class="feed" id="feed"></div>
    <div class="cfoot">
      <div class="typing" id="typing" style="display:none">Rudi is typing…</div>
      <textarea id="chatInput" placeholder="Type a message as the user…" rows="1"></textarea>
      <div class="actions">
        <button class="btn primary" id="sendBtn">Send</button>
        <button class="btn light" id="saveBtn">Save Conversation</button>
        <span class="spacer"></span>
        <button class="btn light" id="exitBtn">Exit</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="test-config.js"></script>
<script src="test-demo.js"></script>
<script>
(function(){
  "use strict";
  var CFG = window.TEST_CONSOLE_CONFIG || {};
  var API = (CFG.API_BASE || "").replace(/\/$/,"");
  var DEMO = !API;
  var state = { token:null, conversations:[], personas:[], personaDefault:"", activeUid:null, messages:[] };

  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ var d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }
  function fmtTime(iso){ if(!iso) return ""; var d=new Date(iso); return d.toLocaleString([], {day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
  function toast(m){ var t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2400); }
  function show(id){ $(id).classList.remove("hidden"); }
  function hide(id){ $(id).classList.add("hidden"); }
  function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

  // ---- transport ----------------------------------------------------------
  function headers(){ var h={"Content-Type":"application/json"}; if(state.token) h["X-Console-Token"]=state.token; return h; }
  function req(method, path, body){
    return fetch(API+path,{method:method,headers:headers(),body:body!=null?JSON.stringify(body):undefined})
      .then(async function(r){ var b; try{ b=await r.json(); }catch(e){ b={}; } return {status:r.status, body:b}; });
  }
  var api = DEMO ? window.TEST_DEMO_API : {
    login:function(email,pw){ return req("POST","/login",{email:email,password:pw}); },
    personalities:function(){ return req("GET","/personalities"); },
    list:function(){ return req("GET","/conversations"); },
    create:function(name,persona){ return req("POST","/conversations",{name:name,persona:persona}); },
    thread:function(uid){ return req("GET","/conversations/"+uid+"/messages"); },
    send:function(uid,text){ return req("POST","/conversations/"+uid+"/messages",{text:text}); },
    del:function(uid){ return req("POST","/conversations/"+uid+"/delete"); },
    exportOne:function(uid){ return req("GET","/conversations/"+uid+"/export"); },
    exportBulk:function(scope,from,to){ var q="?scope="+scope+(scope==="interval"?("&from="+from+"&to="+to):""); return req("GET","/export"+q); }
  };

  // ---- download helper ----------------------------------------------------
  function download(filename, text){
    var blob=new Blob([text],{type:"text/markdown;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=filename||"export.md";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  }

  // ---- login --------------------------------------------------------------
  function doLogin(){
    var email=$("email").value.trim(), pw=$("password").value;
    $("loginErr").textContent="";
    if(!email||!pw){ $("loginErr").textContent="Enter email and password."; return; }
    Promise.resolve(api.login(email,pw)).then(function(r){
      var b=r.body||{};
      if(r.status===200 && b.token){ state.token=b.token; try{ sessionStorage.setItem("rudi_test_token",b.token); }catch(e){} enterApp(); }
      else if(r.status===403){ $("loginErr").textContent="Account locked after too many failed attempts. An admin must unlock it."; }
      else if(r.status===401){ $("loginErr").textContent="Invalid email or password."+(b.attempts_left!=null?(" "+b.attempts_left+" attempt(s) left before lockout."):""); }
      else if(r.status===503){ $("loginErr").textContent="Login is not configured on the server yet."; }
      else { $("loginErr").textContent="Login failed ("+r.status+")."; }
    }).catch(function(){ $("loginErr").textContent="Network error."; });
  }

  function enterApp(){
    hide("loginOverlay"); $("mainScreen").style.display="block";
    loadPersonas(); loadConversations();
  }

  function logout(){ state.token=null; try{ sessionStorage.removeItem("rudi_test_token"); }catch(e){} $("mainScreen").style.display="none"; show("loginOverlay"); }

  // ---- personas -----------------------------------------------------------
  function loadPersonas(){
    return Promise.resolve(api.personalities()).then(function(r){
      var b=r.body||r; state.personas=b.personalities||[]; state.personaDefault=b.default||"";
      var sel=$("convPersona");
      sel.innerHTML=state.personas.map(function(p){
        var label=p.name+(p.slug===state.personaDefault?" (default)":"");
        return '<option value="'+esc(p.slug)+'">'+esc(label)+'</option>';
      }).join("");
    }).catch(function(){});
  }
  function personaName(slug){ var p=state.personas.filter(function(x){return x.slug===slug;})[0]; return p?p.name:slug; }

  // ---- conversations list -------------------------------------------------
  function loadConversations(){
    return Promise.resolve(api.list()).then(function(r){
      state.conversations=(r.body||r).conversations||[]; renderCards();
    }).catch(function(){ toast("Could not load conversations"); });
  }

  function renderCards(){
    var box=$("cards");
    var rows=state.conversations.slice().sort(function(a,b){
      return (b.last_message_at||b.created_at||"").localeCompare(a.last_message_at||a.created_at||"");
    });
    if(!rows.length){ box.innerHTML='<div class="empty">No conversations yet. Click <b>＋ New conversation</b> to start testing.</div>'; return; }
    box.innerHTML="";
    rows.forEach(function(c){
      var el=document.createElement("div"); el.className="card";
      el.innerHTML=
        '<button class="x" title="Remove from view (data kept)">✕</button>'+
        '<div class="cname">'+esc(c.name)+'</div>'+
        '<div class="cmeta">Started '+esc(fmtTime(c.created_at))+' · '+ (c.message_count||0) +' turns</div>'+
        '<div class="cprev">'+(c.last_direction==="out"?"Rudi: ":"")+esc(c.last_message_preview||"")+'</div>'+
        '<span class="persona">'+esc(personaName(c.persona_effective||c.persona||state.personaDefault))+'</span>';
      el.querySelector(".x").onclick=function(ev){ ev.stopPropagation(); softDelete(c); };
      el.onclick=function(){ openConversation(c.user_id); };
      box.appendChild(el);
    });
  }

  function softDelete(c){
    // optimistic remove; data is retained server-side
    state.conversations=state.conversations.filter(function(x){return x.user_id!==c.user_id;});
    renderCards();
    Promise.resolve(api.del(c.user_id)).then(function(){ toast("Removed from view"); })
      .catch(function(){ toast("Delete failed"); loadConversations(); });
  }

  // ---- new conversation ---------------------------------------------------
  function openNew(){ $("convName").value=""; $("newErr").textContent=""; show("newOverlay"); $("convName").focus(); }
  function createConversation(){
    var name=$("convName").value.trim(); var persona=$("convPersona").value;
    $("newErr").textContent="";
    if(!name){ $("newErr").textContent="Please enter a name."; return; }
    $("createBtn").disabled=true;
    Promise.resolve(api.create(name,persona)).then(function(r){
      $("createBtn").disabled=false;
      if(r.status===201){ hide("newOverlay"); loadConversations(); openConversation((r.body||r).conversation.user_id); }
      else { $("newErr").textContent="Could not create ("+r.status+")."; }
    }).catch(function(){ $("createBtn").disabled=false; $("newErr").textContent="Network error."; });
  }

  // ---- conversation (chat) ------------------------------------------------
  function openConversation(uid){
    state.activeUid=uid; state.messages=[];
    Promise.resolve(api.thread(uid)).then(function(r){
      var b=r.body||r;
      state.messages=b.messages||[];
      var c=b.conversation||{};
      $("chatName").textContent=c.name||"Conversation";
      $("chatPersona").textContent=personaName(c.persona_effective||c.persona||state.personaDefault);
      renderFeed(); show("chatOverlay"); $("chatInput").focus();
    }).catch(function(){ toast("Could not open conversation"); });
  }

  function renderFeed(){
    var feed=$("feed"); feed.innerHTML="";
    state.messages.forEach(function(m){
      var mine = m.direction==="in";  // the tester (user) is on the right, Rudi on the left
      var wrap=document.createElement("div"); wrap.className="msg "+(mine?"me":"rudi");
      var text=m.text||"[attachment]";
      wrap.innerHTML='<div class="bubble">'+esc(text)+'<span class="stamp">'+fmtTime(m.at)+'</span></div>';
      feed.appendChild(wrap);
    });
    feed.scrollTop=feed.scrollHeight;
  }

  function sendMessage(){
    var input=$("chatInput"); var text=input.value.trim(); if(!text||!state.activeUid) return;
    input.value=""; autosize();
    // optimistic echo of the user's turn
    state.messages.push({direction:"in",text:text,at:new Date().toISOString()}); renderFeed();
    $("sendBtn").disabled=true; $("typing").style.display="block";
    Promise.resolve(api.send(state.activeUid,text)).then(function(r){
      $("sendBtn").disabled=false; $("typing").style.display="none";
      var b=r.body||r;
      if(r.status===200 && b.reply){
        state.messages.push({direction:"out",text:b.reply,at:new Date().toISOString()}); renderFeed(); loadConversations();
      } else if(r.status===503){ toast("Models busy — try again in a moment."); }
      else { toast("Send failed ("+r.status+")"); }
    }).catch(function(){ $("sendBtn").disabled=false; $("typing").style.display="none"; toast("Network error"); });
  }

  function saveConversation(){
    if(!state.activeUid) return;
    Promise.resolve(api.exportOne(state.activeUid)).then(function(r){
      var b=r.body||r; if(b.markdown){ download(b.filename,b.markdown); toast("Downloaded"); } else toast("Export failed");
    }).catch(function(){ toast("Export failed"); });
  }

  function exitChat(){ hide("chatOverlay"); state.activeUid=null; loadConversations(); }

  // ---- export -------------------------------------------------------------
  function exportAll(){
    Promise.resolve(api.exportBulk("all")).then(function(r){
      var b=r.body||r; if(b.markdown){ download(b.filename,b.markdown); hide("exportOverlay"); toast("Exported "+(b.count||0)+" conversation(s)"); } else toast("Export failed");
    }).catch(function(){ toast("Export failed"); });
  }
  function openInterval(){
    hide("exportOverlay"); $("intervalErr").textContent="";
    $("fromDate").value="2026-01-01"; $("toDate").value=todayISO(); show("intervalOverlay");
  }
  function extractInterval(){
    var from=$("fromDate").value, to=$("toDate").value; $("intervalErr").textContent="";
    if(!from||!to){ $("intervalErr").textContent="Both dates are required (YYYY-MM-DD)."; return; }
    if(from>to){ $("intervalErr").textContent="\"From\" must be on or before \"To\"."; return; }
    Promise.resolve(api.exportBulk("interval",from,to)).then(function(r){
      var b=r.body||r;
      if(b.markdown){ download(b.filename,b.markdown); hide("intervalOverlay"); toast("Exported "+(b.count||0)+" conversation(s)"); }
      else { $("intervalErr").textContent="Export failed ("+r.status+")."; }
    }).catch(function(){ $("intervalErr").textContent="Network error."; });
  }

  // ---- wiring -------------------------------------------------------------
  function autosize(){ var t=$("chatInput"); t.style.height="44px"; t.style.height=Math.min(110,t.scrollHeight)+"px"; }
  $("loginBtn").onclick=doLogin;
  $("password").addEventListener("keydown",function(e){ if(e.key==="Enter") doLogin(); });
  $("logoutBtn").onclick=logout;
  $("newBtn").onclick=openNew;
  $("createBtn").onclick=createConversation;
  $("exportBtn").onclick=function(){ show("exportOverlay"); };
  $("exportAllBtn").onclick=exportAll;
  $("exportIntervalOpenBtn").onclick=openInterval;
  $("extractBtn").onclick=extractInterval;
  $("sendBtn").onclick=sendMessage;
  $("saveBtn").onclick=saveConversation;
  $("exitBtn").onclick=exitChat;
  $("chatInput").addEventListener("keydown",function(e){ autosize(); if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
  Array.prototype.forEach.call(document.querySelectorAll("[data-close]"),function(b){ b.onclick=function(){ hide(b.getAttribute("data-close")); }; });

  $("mode").textContent = DEMO ? "DEMO (synthetic)" : "LIVE";
  if(DEMO) $("mode").classList.add("demo");

  // auto-resume a session token if present
  try{ var t=sessionStorage.getItem("rudi_test_token"); if(t){ state.token=t; enterApp(); } }catch(e){}
})();
</script>
</body>
</html>
